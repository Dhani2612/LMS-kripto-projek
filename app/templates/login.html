<!DOCTYPE html>
<html>

<head>
  <title>Login SAKTI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="container">
    <h2><i class="fa-solid fa-graduation-cap" style="color: var(--primary); margin-right: 10px;"></i>Welcome Back</h2>
    <p class="subtitle">Log in to Kripto Sakti to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
      <div class="flash {{ category }}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="identifier">NIM / NIDN</label>
        <input type="text" name="identifier" id="identifier" placeholder="Enter your NIM or NIDN" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit"><i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i>Login</button>

      <div class="register-links">
        <a href="{{ url_for('main.register_dosen') }}">Register Dosen</a>
        <a href="{{ url_for('main.register_mahasiswa') }}">Register Mahasiswa</a>
      </div>
    </form>
  </div>

</body>

</html>
